# Configuration des sources à scraper sur le site officiel du HCP (hcp.ma)
#
# hcp_data.csv (format livré par le PO) ne demande que 2 des 3 fichiers
# que vous scrapiez : Ménages et Individus. population_legale_rgph2024 est
# conservé ici pour info mais n'est PAS utilisé par 01_build_hcp_data.py.

datasets:

  communes_rgph2014_menages:
    description: >
      RGPH 2014 - Indicateurs communaux - Ménages (habitat, équipement du
      logement, statut d'occupation, etc.)
    page_url: "https://www.hcp.ma/downloads/RGPH-2014_t22381.html"
    exact_title: "RGPH 2014 - Indicateurs communaux - Ménages.xlsx"
    expected_format: "xlsx"
    output_filename: "communes_hcp_menages.xlsx"

  communes_rgph2014_individus:
    description: >
      RGPH 2014 - Indicateurs communaux - Individus (démographie, activité,
      éducation, etc. au niveau individu).
    page_url: "https://www.hcp.ma/downloads/RGPH-2014_t22381.html"
    exact_title: "RGPH 2014 - Indicateurs communaux - Individus.xlsx"
    expected_format: "xlsx"
    output_filename: "communes_hcp_individus.xlsx"

  population_legale_rgph2024:
    description: >
      Population légale du Royaume par région/province/préfecture/commune,
      RGPH 2024 (format Excel). Non utilisé par hcp_data.csv actuellement.
    page_url: "https://www.hcp.ma/downloads/RGPH-2024_t22752.html"
    exact_title: "Population légale du Royaume du Maroc selon les résultats du RGPH 2024, format EXCEL"
    expected_format: "xlsx"
    output_filename: "population_legale_rgph2024.xlsx"

http:
  user_agent: "ETL-HCP-Pipeline/1.0 (+contact: <votre-email>; usage interne de collecte de donnees publiques)"
  timeout_seconds: 30
  max_retries: 3
  backoff_seconds: 5
  delay_between_requests_seconds: 2
