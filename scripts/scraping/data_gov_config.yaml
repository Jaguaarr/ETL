# data_gov_config.yaml
# ---------------------
# Configuration des ressources a scraper sur le portail Open Data marocain
# (data.gov.ma, propulse par CKAN).
#
# Choix du dataset (cf. cadrage projet : "si les donnees de data.gov sont
# deja existantes dans HCP, ne pas les reprendre ; uniquement ce qui manque
# et qui est pertinent") :
#
#   Le fichier HCP (communes_hcp) couvre demographie / instruction / emploi
#   / logement au niveau commune, mais AUCUNE donnee d'infrastructure de
#   sante. Le Ministere de la Sante publie sur data.gov.ma la "Liste des
#   centres de sante par Province/Commune" (granularite commune, pas
#   couverte par HCP) -> jeu de donnees retenu ici.
#
#   D'autres jeux de donnees "commune" du portail (indicateurs sociaux,
#   demographie, etc.) recoupent tres largement ce que HCP fournit deja et
#   ont ete volontairement exclus pour eviter la redondance.
#
# CKAN expose une API REST stable (package_show) qui retourne les
# ressources telechargeables d'un jeu de donnees ; on l'utilise plutot que
# de parser le HTML de la page, plus robuste dans le temps.

ckan:
  api_base: "https://data.gov.ma/data/api/3/action"

datasets:

  centres_sante:
    description: >
      Liste des centres de sante par Province/Commune (Ministere de la
      Sante), publiee sur data.gov.ma. Complementaire a HCP : granularite
      commune, dimension "infrastructure de sante" absente du dataset HCP.
    package_id: "0e19504c-2f0f-4edc-9ad7-77e2bfa6c389"
    resource_id: "5d171104-f1ab-402c-ad03-920f92f2717d"
    # URL de secours si l'API CKAN package_show est indisponible : l'URL de
    # telechargement direct observee sur la fiche du jeu de donnees.
    fallback_download_url: "https://data.gov.ma/data/fr/dataset/0e19504c-2f0f-4edc-9ad7-77e2bfa6c389/resource/5d171104-f1ab-402c-ad03-920f92f2717d/download/liste-des-centres-de-sante-2011.xls"
    expected_format: "xls"
    output_filename_raw: "datagov_centres_sante_raw.csv"

http:
  user_agent: "ETL-HCP-Pipeline/1.0 (+contact: <votre-email>; usage interne de collecte de donnees publiques)"
  timeout_seconds: 30
  max_retries: 3
  backoff_seconds: 5
