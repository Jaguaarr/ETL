# column_mapping.yaml
# -------------------
# 01_build_hcp_data.py utilise ce fichier pour savoir, pour CHAQUE colonne du
# format cible (hcp_data.csv fourni par le PO), où aller chercher la valeur :
# soit dans le fichier scrappé "Ménages", soit dans "Individus", soit dans la
# référence géo statique (datasets/hcp/reference/communes_geo_reference.csv).
#
# IMPORTANT : les valeurs "column:" ci-dessous sont des suppositions
# raisonnables (le script fait aussi du matching flou automatique en secours,
# voir 01_build_hcp_data.py::auto_match). Après le premier scraping réel,
# lancez :
#     python3 inspect_columns.py ../../datasets/hcp/communes_hcp_menages.xlsx
#     python3 inspect_columns.py ../../datasets/hcp/communes_hcp_individus.xlsx
# et corrigez ici toute colonne mal résolue (voir mapping_report.csv généré
# par 01_build_hcp_data.py après chaque run : il liste les colonnes non
# trouvées ou ambiguës).

join_key_target: Code_Commune   # colonne pivot pour la jointure

geo_reference: ../../datasets/hcp/reference/communes_geo_reference.csv

sources:
  menages:
    file: ../../datasets/hcp/communes_hcp_menages.xlsx
    join_key: Code_Commune       # nom de la colonne pivot DANS ce fichier source
  individus:
    file: ../../datasets/hcp/communes_hcp_individus.xlsx
    join_key: Code_Commune

# Colonnes fournies directement par la référence géo (jamais par le scraping) :
#   OBJECTID, SHAPE, Type_Commune, Code_Commune, Nom_Commune, Code_Province,
#   SHAPE_Length, SHAPE_Area
# -> pas besoin de les lister ci-dessous, 01_build_hcp_data.py les prend
#    automatiquement depuis geo_reference.

# Colonnes indicateurs : "source" = menages | individus (laissez vide pour
# forcer le matching flou automatique à décider). "column" = nom EXACT de la
# colonne dans le fichier xlsx source (avant renommage) ; laissez vide pour
# laisser le matching flou trouver tout seul.
