# data_gov_column_mapping.yaml
# ------------------------------
# 04_build_datagov_data.py utilise ce fichier pour savoir, pour CHAQUE
# colonne du format cible (datasets/data_gov_centres_sante.csv), quelle
# colonne aller chercher dans le fichier brut scrappe (datasets/data_gov/
# datagov_centres_sante_raw.csv, en-tetes 1:1 avec le fichier source
# Ministere de la Sante).
#
# Meme logique que scripts/scraping/column_mapping.yaml (HCP) : matching
# explicite si "column" est renseigne, sinon matching flou (accents/
# espaces/casse ignores) automatique en secours. Toute colonne cible non
# resolue est laissee vide ET reportee dans mapping_report_datagov.csv
# (jamais d'echec silencieux) -> a corriger ici apres le premier scraping
# reel, en s'aidant de `python3 inspect_columns.py <fichier_raw.csv>`.
#
# Colonnes cibles (grain = 1 ligne par centre de sante) :
#   region, province, commune, nom_etablissement, milieu, type_etablissement

columns:
  region:              {column: ""}   # ex. source possible: "Région"
  province:             {column: ""}   # ex. source possible: "Province"
  commune:               {column: ""}   # ex. source possible: "Commune"
  nom_etablissement:     {column: ""}   # ex. source possible: "Formation Sanitaire" / "Nom"
  milieu:                 {column: ""}   # ex. source possible: "Milieu" (Urbain/Rural)
  type_etablissement:     {column: ""}   # ex. source possible: "Type" / "Catégorie"
